<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">
      {{ isEditMode ? ('grupoCuenta.editTitle' | translate) : ('grupoCuenta.newTitle' | translate) }}
    </h1>
  </div>

  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
      <div class="form-row">
        <div class="form-group">
          <label for="codigo" class="form-label">{{ 'grupoCuenta.codigo' | translate }} *</label>
          <input type="text"
                 id="codigo"
                 formControlName="codigo"
                 class="form-control"
                 [class.is-invalid]="form.get('codigo')?.invalid && form.get('codigo')?.touched"
                 placeholder="Ej: 01" />
          <div class="invalid-feedback" *ngIf="form.get('codigo')?.invalid && form.get('codigo')?.touched">
            {{ getErrorMessage('codigo') }}
          </div>
        </div>

        <div class="form-group">
          <label for="nombre" class="form-label">{{ 'grupoCuenta.nombre' | translate }} *</label>
          <input type="text"
                 id="nombre"
                 formControlName="nombre"
                 class="form-control"
                 [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
                 placeholder="Ej: Activo" />
          <div class="invalid-feedback" *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
            {{ getErrorMessage('nombre') }}
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="descripcion" class="form-label">{{ 'grupoCuenta.descripcion' | translate }}</label>
        <textarea id="descripcion"
                  formControlName="descripcion"
                  class="form-control"
                  rows="4"
                  placeholder="Descripción opcional del grupo de cuenta"></textarea>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="activo" class="form-checkbox" />
          <span>{{ 'grupoCuenta.activo' | translate }}</span>
        </label>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading">
          ❌ {{ 'common.cancel' | translate }}
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">💾 {{ 'common.save' | translate }}</span>
          <span *ngIf="loading">⏳ {{ 'common.saving' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
