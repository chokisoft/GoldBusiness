<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">
      {{ isEditMode ? ('pais.editTitle' | translate) : ('pais.newTitle' | translate) }}
    </h1>
  </div>

  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="card">
    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form-container">
      <div class="form-row">
        <div class="form-group">
          <label for="codigo" class="form-label">{{ 'pais.codigo' | translate }} *</label>
          <input type="text"
                 id="codigo"
                 formControlName="codigo"
                 class="form-control"
                 [class.is-invalid]="itemForm.get('codigo')?.invalid && itemForm.get('codigo')?.touched"
                 [placeholder]="'pais.codigoPlaceholder' | translate"
                 maxlength="3" />
          <div class="invalid-feedback" *ngIf="itemForm.get('codigo')?.invalid && itemForm.get('codigo')?.touched">
            {{ 'validation.required' | translate }}
          </div>
        </div>

        <div class="form-group">
          <label for="descripcion" class="form-label">{{ 'pais.nombre' | translate }} *</label>
          <input type="text"
                 id="descripcion"
                 formControlName="descripcion"
                 class="form-control"
                 [class.is-invalid]="itemForm.get('descripcion')?.invalid && itemForm.get('descripcion')?.touched"
                 [placeholder]="'pais.nombrePlaceholder' | translate"
                 maxlength="100" />
          <div class="invalid-feedback" *ngIf="itemForm.get('descripcion')?.invalid && itemForm.get('descripcion')?.touched">
            {{ 'validation.required' | translate }}
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="saving">
          ❌ {{ 'common.cancel' | translate }}
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="saving || itemForm.invalid">
          <span *ngIf="!saving">💾 {{ 'common.save' | translate }}</span>
          <span *ngIf="saving">⏳ {{ 'common.saving' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
