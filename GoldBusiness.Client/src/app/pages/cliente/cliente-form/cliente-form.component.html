<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">
        {{ isEditMode ? ('clientes.editTitle' | translate) : ('clientes.newTitle' | translate) }}
      </h1>
    </div>
  </div>

  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="card">
    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form-container" *ngIf="!loading">
      <div class="form-row">
        <div class="form-group">
          <label for="codigo" class="form-label">{{ 'clientes.codigo' | translate }} *</label>
          <input type="text" id="codigo" formControlName="codigo" class="form-control"
                 [class.is-invalid]="itemForm.get('codigo')?.invalid && itemForm.get('codigo')?.touched"
                 maxlength="8" />
          <div class="invalid-feedback" *ngIf="itemForm.get('codigo')?.hasError('required') && itemForm.get('codigo')?.touched">
            {{ 'validation.required' | translate }}
          </div>
          <div class="invalid-feedback" *ngIf="(itemForm.get('codigo')?.hasError('minlength') || itemForm.get('codigo')?.hasError('maxlength')) && itemForm.get('codigo')?.touched">
            {{ 'validation.lengthExact' | translate:{length:8} }}
          </div>
        </div>

        <div class="form-group">
          <label for="descripcion" class="form-label">{{ 'clientes.descripcion' | translate }} *</label>
          <input type="text" id="descripcion" formControlName="descripcion" class="form-control"
                 [class.is-invalid]="itemForm.get('descripcion')?.invalid && itemForm.get('descripcion')?.touched"
                 maxlength="256" />
          <div class="invalid-feedback" *ngIf="itemForm.get('descripcion')?.hasError('required') && itemForm.get('descripcion')?.touched">
            {{ 'validation.required' | translate }}
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="nif" class="form-label">{{ 'clientes.nif' | translate }}</label>
          <input type="text" id="nif" formControlName="nif" class="form-control" maxlength="11" />
        </div>
        <div class="form-group">
          <label for="iva" class="form-label">{{ 'clientes.iva' | translate }} *</label>
          <input type="number" id="iva" formControlName="iva" class="form-control" step="0.01" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="iban" class="form-label">{{ 'clientes.iban' | translate }}</label>
          <input type="text" id="iban" formControlName="iban" class="form-control" maxlength="27" />
        </div>
        <div class="form-group">
          <label for="bicoSwift" class="form-label">{{ 'clientes.bic' | translate }}</label>
          <input type="text" id="bicoSwift" formControlName="bicoSwift" class="form-control" maxlength="11" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group form-group-full">
          <label for="direccion" class="form-label">{{ 'clientes.direccion' | translate }}</label>
          <input type="text" id="direccion" formControlName="direccion" class="form-control" maxlength="256" />
        </div>
      </div>

      <!-- Cascada: País -> Provincia -> Municipio -> Código Postal -->
      <div class="form-row">
        <div class="form-group">
          <label for="paisId" class="form-label">{{ 'clientes.pais' | translate }}</label>
          <select id="paisId" formControlName="paisId" class="form-control shared-select"
                  [class.shared-disabled]="!paises.length" [attr.aria-disabled]="!paises.length">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let p of paises" [ngValue]="p.id">{{ p.descripcion }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="provinciaId" class="form-label">{{ 'clientes.provincia' | translate }}</label>
          <select id="provinciaId" formControlName="provinciaId" class="form-control shared-select"
                  [disabled]="!itemForm.get('paisId')?.value" [class.shared-disabled]="!itemForm.get('paisId')?.value"
                  [attr.aria-disabled]="!itemForm.get('paisId')?.value">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let pr of provincias" [ngValue]="pr.id">{{ pr.descripcion }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="municipioId" class="form-label">{{ 'clientes.municipio' | translate }}</label>
          <select id="municipioId" formControlName="municipioId" class="form-control shared-select"
                  [disabled]="!itemForm.get('provinciaId')?.value" [class.shared-disabled]="!itemForm.get('provinciaId')?.value"
                  [attr.aria-disabled]="!itemForm.get('provinciaId')?.value">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let m of municipios" [ngValue]="m.id">{{ m.descripcion }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="codigoPostalId" class="form-label">{{ 'clientes.codigoPostal' | translate }}</label>
          <select id="codigoPostalId" formControlName="codigoPostalId" class="form-control shared-select"
                  [disabled]="!itemForm.get('municipioId')?.value" [class.shared-disabled]="!itemForm.get('municipioId')?.value"
                  [attr.aria-disabled]="!itemForm.get('municipioId')?.value">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let cp of codigosPostales" [ngValue]="cp.id">{{ cp.codigo }}{{ cp.descripcion ? (' - ' + cp.descripcion) : '' }}</option>
          </select>
        </div>
      </div>

      <!-- Contactos / Correos -->
      <div class="form-row">
        <div class="form-group">
          <label for="web" class="form-label">{{ 'clientes.web' | translate }}</label>
          <input type="url" id="web" formControlName="web" class="form-control" maxlength="256" />
        </div>
        <div class="form-group">
          <label for="email1" class="form-label">{{ 'clientes.email1' | translate }}</label>
          <input type="email" id="email1" formControlName="email1" class="form-control"
                 [class.is-invalid]="itemForm.get('email1')?.invalid && itemForm.get('email1')?.touched" maxlength="256" />
          <div class="invalid-feedback" *ngIf="itemForm.get('email1')?.hasError('email')">
            {{ 'validation.email' | translate }}
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email2" class="form-label">{{ 'clientes.email2' | translate }}</label>
          <input type="email" id="email2" formControlName="email2" class="form-control" maxlength="256" />
        </div>
        <div class="form-group">
          <label for="telefono1" class="form-label">{{ 'clientes.telefono1' | translate }}</label>
          <input type="text" id="telefono1" formControlName="telefono1" class="form-control" maxlength="50" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="telefono2" class="form-label">{{ 'clientes.telefono2' | translate }}</label>
          <input type="text" id="telefono2" formControlName="telefono2" class="form-control" maxlength="50" />
        </div>
        <div class="form-group">
          <label for="fax1" class="form-label">{{ 'clientes.fax1' | translate }}</label>
          <input type="text" id="fax1" formControlName="fax1" class="form-control" maxlength="50" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fax2" class="form-label">{{ 'clientes.fax2' | translate }}</label>
          <input type="text" id="fax2" formControlName="fax2" class="form-control" maxlength="50" />
        </div>
        <div class="form-group form-group-inline">
          <label class="form-label">{{ 'common.status' | translate }}</label>
          <div class="form-check">
            <input type="checkbox" id="cancelado" formControlName="cancelado" class="form-check-input" />
            <label for="cancelado" class="form-check-label">{{ 'common.cancelled' | translate }}</label>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="saving">
          ❌ {{ 'common.cancel' | translate }}
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="saving || itemForm.invalid">
          <span *ngIf="!saving">💾 {{ 'common.save' | translate }}</span>
          <span *ngIf="saving">⏳ {{ 'common.saving' | translate }}</span>
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="loading" class="loading-container">
    <app-loader [translateKey]="'common.loading'" [center]="true" [size]="28" [inline]="false"></app-loader>
  </div>
</div>
