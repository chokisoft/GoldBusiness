<div class="page-container cliente-form-page">
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">
        {{ isEditMode ? ('clientes.editTitle' | translate) : ('clientes.newTitle' | translate) }}
      </h1>
      <p class="page-subtitle">{{ 'common.fillRequired' | translate }}</p>
    </div>
  </div>

  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="card">
    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form-container">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'clientes.codigo' | translate }} *</label>
          <input class="form-control"
                 formControlName="codigo"
                 maxlength="8"
                 [class.is-invalid]="itemForm.get('codigo')?.invalid && itemForm.get('codigo')?.touched"
                 placeholder="{{ 'clientes.placeholderCodigo' | translate }}" />
          <div class="invalid-feedback" *ngIf="itemForm.get('codigo')?.invalid && itemForm.get('codigo')?.touched">
            {{ 'common.invalid' | translate }}
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'clientes.descripcion' | translate }} *</label>
          <input class="form-control"
                 formControlName="descripcion"
                 maxlength="256"
                 [class.is-invalid]="itemForm.get('descripcion')?.invalid && itemForm.get('descripcion')?.touched"
                 placeholder="{{ 'clientes.placeholderDescripcion' | translate }}" />
          <div class="invalid-feedback" *ngIf="itemForm.get('descripcion')?.invalid && itemForm.get('descripcion')?.touched">
            {{ 'common.invalid' | translate }}
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'clientes.nif' | translate }}</label>
          <input class="form-control" formControlName="nif" maxlength="11" placeholder="{{ 'clientes.placeholderNif' | translate }}" />
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'clientes.iva' | translate }}</label>
          <input class="form-control" formControlName="iva" type="number" placeholder="0.00" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'clientes.direccion' | translate }}</label>
        <textarea class="form-control" formControlName="direccion" rows="2" placeholder="{{ 'clientes.placeholderDireccion' | translate }}"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'clientes.pais' | translate }}</label>
          <select class="form-control shared-select" formControlName="paisId" [attr.aria-disabled]="itemForm.get('paisId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let p of paises" [ngValue]="p.id">{{ p.descripcion }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'clientes.provincia' | translate }}</label>
          <select class="form-control shared-select" formControlName="provinciaId" [attr.aria-disabled]="itemForm.get('provinciaId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let prov of provincias" [ngValue]="prov.id">{{ prov.descripcion }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'clientes.municipio' | translate }}</label>
          <select class="form-control shared-select" formControlName="municipioId" [attr.aria-disabled]="itemForm.get('municipioId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let mun of municipios" [ngValue]="mun.id">{{ mun.descripcion }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'clientes.codigoPostal' | translate }}</label>
          <select class="form-control shared-select" formControlName="codigoPostalId" [attr.aria-disabled]="itemForm.get('codigoPostalId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let cp of codigosPostales" [ngValue]="cp.id">{{ cp.codigo }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'clientes.email1' | translate }}</label>
          <input class="form-control" formControlName="email1" type="email" placeholder="{{ 'clientes.placeholderEmail' | translate }}" />
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'clientes.telefono1' | translate }}</label>
          <input class="form-control" formControlName="telefono1" placeholder="{{ 'clientes.placeholderTelefono' | translate }}" />
          <div class="form-text" *ngIf="selectedPais">{{ selectedPais.formatoEjemplo }} <small>({{ selectedPais.formatoTelefono }})</small></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'clientes.email2' | translate }}</label>
          <input class="form-control" formControlName="email2" type="email" />
        </div>
        <div class="form-group">
          <label class="form-label">{{ 'clientes.telefono2' | translate }}</label>
          <input class="form-control" formControlName="telefono2" />
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">{{ 'common.cancel' | translate }}</button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || saving">{{ saving ? ('common.saving' | translate) : ('common.save' | translate) }}</button>
      </div>
    </form>
  </div>
</div>
