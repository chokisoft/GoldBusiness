<div class="page-container proveedor-form-page">
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">
        {{ isEditMode ? ('proveedores.editTitle' | translate) : ('proveedores.newTitle' | translate) }}
      </h1>
    </div>
  </div>

  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="card">
    <form class="form-container compact-top-row" [formGroup]="itemForm" (ngSubmit)="onSubmit()" *ngIf="!loading">
      <!-- Compact row: Código | RFC | IVA | Descripción -->
      <div class="form-row-three">
        <div class="form-group">
          <label for="codigo" class="form-label">{{ 'proveedores.codigo' | translate }} *</label>
          <input id="codigo" type="text" formControlName="codigo" class="form-control"
                 [class.is-invalid]="itemForm.get('codigo')?.invalid && itemForm.get('codigo')?.touched" maxlength="5" />
        </div>

        <div class="form-group">
          <label for="nif" class="form-label">{{ 'proveedores.rfc' | translate }}</label>
          <input id="nif" type="text" formControlName="nif" class="form-control" maxlength="11" />
        </div>

        <div class="form-group">
          <label for="iva" class="form-label">{{ 'proveedores.iva' | translate }}</label>
          <input id="iva" type="number" formControlName="iva" class="form-control no-spinner"
                 inputmode="numeric" pattern="[0-9]*" step="1" />
        </div>

        <div class="form-group">
          <label for="descripcion" class="form-label">{{ 'proveedores.descripcion' | translate }} *</label>
          <input id="descripcion" type="text" formControlName="descripcion" class="form-control"
                 [class.is-invalid]="itemForm.get('descripcion')?.invalid && itemForm.get('descripcion')?.touched" maxlength="256" />
          <div class="invalid-feedback" *ngIf="itemForm.get('descripcion')?.hasError('required') && itemForm.get('descripcion')?.touched">
            {{ 'validation.required' | translate }}
          </div>
        </div>
      </div>

      <!-- resto del formulario sin cambios -->
      <div class="form-row">
        <div class="form-group">
          <label for="paisId" class="form-label">{{ 'proveedores.pais' | translate }}</label>
          <select id="paisId" formControlName="paisId" class="form-control shared-select"
                  [class.shared-disabled]="!paises.length" [attr.aria-disabled]="!paises.length">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let p of paises" [ngValue]="p.id">{{ p.descripcion }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="provinciaId" class="form-label">{{ 'proveedores.provincia' | translate }}</label>
          <select id="provinciaId" formControlName="provinciaId" class="form-control shared-select"
                  [class.shared-disabled]="itemForm.get('provinciaId')?.disabled" [attr.aria-disabled]="itemForm.get('provinciaId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let pr of provincias" [ngValue]="pr.id">{{ pr.descripcion }}</option>
          </select>
        </div>
      </div>

      <!-- resto del formulario igual -->
      <div class="form-row">
        <div class="form-group">
          <label for="municipioId" class="form-label">{{ 'proveedores.municipio' | translate }}</label>
          <select id="municipioId" formControlName="municipioId" class="form-control shared-select"
                  [class.shared-disabled]="itemForm.get('municipioId')?.disabled" [attr.aria-disabled]="itemForm.get('municipioId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let m of municipios" [ngValue]="m.id">{{ m.descripcion }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="codigoPostalId" class="form-label">{{ 'proveedores.codigoPostal' | translate }}</label>
          <select id="codigoPostalId" formControlName="codigoPostalId" class="form-control shared-select"
                  [class.shared-disabled]="itemForm.get('codigoPostalId')?.disabled" [attr.aria-disabled]="itemForm.get('codigoPostalId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let cp of codigosPostales" [ngValue]="cp.id">{{ cp.codigo }}{{ cp.descripcion ? (' - ' + cp.descripcion) : '' }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email1" class="form-label">{{ 'proveedores.email1' | translate }}</label>
          <input id="email1" type="email" formControlName="email1" class="form-control" maxlength="256" />
        </div>
        <div class="form-group">
          <label for="telefono1" class="form-label">{{ 'proveedores.telefono1' | translate }}</label>
          <input id="telefono1" type="text" formControlName="telefono1" class="form-control" maxlength="50" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group form-group-full">
          <label for="direccion" class="form-label">{{ 'proveedores.direccion' | translate }}</label>
          <input id="direccion" type="text" formControlName="direccion" class="form-control" maxlength="256" />
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="saving">❌ {{ 'common.cancel' | translate }}</button>
        <button type="submit" class="btn btn-primary" [disabled]="saving || itemForm.invalid">💾 {{ 'common.save' | translate }}</button>
      </div>
    </form>
  </div>

  <div *ngIf="loading" class="loading-container">
    <app-loader [translateKey]="'common.loading'" [center]="true" [size]="28" [inline]="false"></app-loader>
  </div>
</div>
