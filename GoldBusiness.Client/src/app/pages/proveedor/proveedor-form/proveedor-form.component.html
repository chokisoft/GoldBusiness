<div class="page-container proveedor-form-page">
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">{{ isEditMode ? ('proveedores.editTitle' | translate) : ('proveedores.newTitle' | translate) }}</h1>
      <p class="page-subtitle">{{ 'common.fillRequired' | translate }}</p>
    </div>
  </div>

  <div class="alert alert-error" *ngIf="error">{{ error }}</div>

  <div class="card">
    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form-container">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'proveedores.codigo' | translate }} *</label>
          <input class="form-control" formControlName="codigo" maxlength="5" placeholder="{{ 'proveedores.placeholderCodigo' | translate }}" />
        </div>
        <div class="form-group">
          <label class="form-label">{{ 'proveedores.descripcion' | translate }} *</label>
          <input class="form-control" formControlName="descripcion" maxlength="256" placeholder="{{ 'proveedores.placeholderDescripcion' | translate }}" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'proveedores.nif' | translate }}</label>
          <input class="form-control" formControlName="nif" maxlength="11" />
        </div>
        <div class="form-group">
          <label class="form-label">{{ 'proveedores.iva' | translate }}</label>
          <input class="form-control" formControlName="iva" type="number" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'proveedores.direccion' | translate }}</label>
        <textarea class="form-control" formControlName="direccion" rows="2"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'proveedores.pais' | translate }}</label>
          <select class="form-control shared-select" formControlName="paisId" [attr.aria-disabled]="itemForm.get('paisId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let p of paises" [ngValue]="p.id">{{ p.descripcion }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'proveedores.provincia' | translate }}</label>
          <select class="form-control shared-select" formControlName="provinciaId" [attr.aria-disabled]="itemForm.get('provinciaId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let prov of provincias" [ngValue]="prov.id">{{ prov.descripcion }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'proveedores.municipio' | translate }}</label>
          <select class="form-control shared-select" formControlName="municipioId" [attr.aria-disabled]="itemForm.get('municipioId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let mun of municipios" [ngValue]="mun.id">{{ mun.descripcion }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'proveedores.codigoPostal' | translate }}</label>
          <select class="form-control shared-select" formControlName="codigoPostalId" [attr.aria-disabled]="itemForm.get('codigoPostalId')?.disabled">
            <option [ngValue]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let cp of codigosPostales" [ngValue]="cp.id">{{ cp.codigo }}</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">{{ 'proveedores.email1' | translate }}</label>
          <input class="form-control" formControlName="email1" type="email" />
        </div>
        <div class="form-group">
          <label class="form-label">{{ 'proveedores.telefono1' | translate }}</label>
          <input class="form-control" formControlName="telefono1" />
          <div class="form-text" *ngIf="selectedPais">{{ selectedPais.formatoEjemplo }} <small>({{ selectedPais.formatoTelefono }})</small></div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">{{ 'common.cancel' | translate }}</button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || saving">{{ saving ? ('common.saving' | translate) : ('common.save' | translate) }}</button>
      </div>
    </form>
  </div>
</div>
