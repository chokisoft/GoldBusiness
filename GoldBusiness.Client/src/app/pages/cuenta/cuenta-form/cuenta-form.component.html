<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">
      {{ isEditMode ? ('cuenta.editTitle' | translate) : ('cuenta.newTitle' | translate) }}
    </h1>
  </div>

  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
      <div class="form-row">
        <div class="form-group">
          <label for="codigo" class="form-label">{{ 'cuenta.codigo' | translate }} *</label>
          <input type="text"
                 id="codigo"
                 formControlName="codigo"
                 class="form-control"
                 [class.is-invalid]="form.get('codigo')?.invalid && form.get('codigo')?.touched"
                 placeholder="Ej: 0100101001" />
          <div class="invalid-feedback" *ngIf="form.get('codigo')?.invalid && form.get('codigo')?.touched">
            {{ getErrorMessage('codigo') }}
          </div>
        </div>

        <div class="form-group">
          <label for="subGrupoCuentaId" class="form-label">{{ 'cuenta.subgrupoCuenta' | translate }} *</label>
          <select id="subGrupoCuentaId"
                  formControlName="subGrupoCuentaId"
                  class="form-control"
                  [class.is-invalid]="form.get('subGrupoCuentaId')?.invalid && form.get('subGrupoCuentaId')?.touched">
            <option [value]="null">{{ 'common.select' | translate }}</option>
            <option *ngFor="let subgrupo of subgruposCuenta" [value]="subgrupo.id">
              {{ subgrupo.codigo }} - {{ subgrupo.descripcion }}
            </option>
          </select>
          <div class="invalid-feedback" *ngIf="form.get('subGrupoCuentaId')?.invalid && form.get('subGrupoCuentaId')?.touched">
            {{ getErrorMessage('subGrupoCuentaId') }}
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="descripcion" class="form-label">{{ 'grupoCuenta.descripcion' | translate }} *</label>
        <input type="text"
               id="descripcion"
               formControlName="descripcion"
               class="form-control"
               [class.is-invalid]="form.get('descripcion')?.invalid && form.get('descripcion')?.touched"
               placeholder="Descripción de la cuenta" />
        <div class="invalid-feedback" *ngIf="form.get('descripcion')?.invalid && form.get('descripcion')?.touched">
          {{ getErrorMessage('descripcion') }}
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading">
          ❌ {{ 'common.cancel' | translate }}
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid || loadingSubgrupos">
          <span *ngIf="!loading">💾 {{ 'common.save' | translate }}</span>
          <span *ngIf="loading">⏳ {{ 'common.saving' | translate }}</span>
        </button>
      </div>
    </form>
  </div>
</div>
