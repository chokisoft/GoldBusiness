<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">
      {{ isEditMode ? '✏️ Editar' : '➕ Nueva' }} Cuenta Contable
    </h1>
  </div>

  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
      <div class="form-row">
        <div class="form-group">
          <label for="codigo" class="form-label">Código * (8 dígitos)</label>
          <input type="text"
                 id="codigo"
                 formControlName="codigo"
                 class="form-control"
                 [class.is-invalid]="form.get('codigo')?.invalid && form.get('codigo')?.touched"
                 placeholder="Ej: 10000010"
                 maxlength="8" />
          <div class="invalid-feedback" *ngIf="form.get('codigo')?.invalid && form.get('codigo')?.touched">
            {{ getErrorMessage('codigo') }}
          </div>
        </div>

        <div class="form-group">
          <label for="subGrupoCuentaId" class="form-label">SubGrupo de Cuenta *</label>
          <select id="subGrupoCuentaId"
                  formControlName="subGrupoCuentaId"
                  class="form-control"
                  [class.is-invalid]="form.get('subGrupoCuentaId')?.invalid && form.get('subGrupoCuentaId')?.touched">
            <option [value]="null">Seleccione un subgrupo...</option>
            <option *ngFor="let subgrupo of subgrupos" [value]="subgrupo.id">
              {{ subgrupo.codigo }} - {{ subgrupo.descripcion }}
            </option>
          </select>
          <div class="invalid-feedback" *ngIf="form.get('subGrupoCuentaId')?.invalid && form.get('subGrupoCuentaId')?.touched">
            {{ getErrorMessage('subGrupoCuentaId') }}
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="descripcion" class="form-label">Descripción *</label>
        <textarea id="descripcion"
                  formControlName="descripcion"
                  class="form-control"
                  [class.is-invalid]="form.get('descripcion')?.invalid && form.get('descripcion')?.touched"
                  rows="3"
                  placeholder="Descripción de la cuenta contable"></textarea>
        <div class="invalid-feedback" *ngIf="form.get('descripcion')?.invalid && form.get('descripcion')?.touched">
          {{ getErrorMessage('descripcion') }}
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading">
          ❌ Cancelar
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
          <span *ngIf="!loading">💾 {{ isEditMode ? 'Actualizar' : 'Guardar' }}</span>
          <span *ngIf="loading">⏳ Guardando...</span>
        </button>
      </div>
    </form>
  </div>
</div>
