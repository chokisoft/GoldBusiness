<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">
      {{ isEditMode ? ('localidad.editTitle' | translate) : ('localidad.newTitle' | translate) }}
    </h1>
  </div>

  <div class="alert alert-error" *ngIf="error">
    <span class="alert-icon">⚠️</span>
    {{ error }}
  </div>

  <div class="card">
    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" class="form-container" *ngIf="!loading">
      <div class="form-row">
        <div class="form-group">
          <label for="establecimientoId" class="form-label">{{ 'localidad.establecimiento' | translate }} *</label>
          <select id="establecimientoId"
                  formControlName="establecimientoId"
                  class="form-control"
                  [class.is-invalid]="itemForm.get('establecimientoId')?.invalid && itemForm.get('establecimientoId')?.touched">
            <option value="">{{ 'common.select' | translate }}</option>
            <option *ngFor="let establecimiento of establecimientos" [value]="establecimiento.id">
              {{ establecimiento.descripcion }}
            </option>
          </select>
          <div class="invalid-feedback" *ngIf="itemForm.get('establecimientoId')?.hasError('required') && itemForm.get('establecimientoId')?.touched">
            {{ 'validation.required' | translate }}
          </div>
        </div>

        <div class="form-group">
          <label for="codigo" class="form-label">{{ 'localidad.codigo' | translate }} *</label>
          <input type="text"
                 id="codigo"
                 formControlName="codigo"
                 class="form-control"
                 [class.is-invalid]="itemForm.get('codigo')?.invalid && itemForm.get('codigo')?.touched"
                 [placeholder]="'localidad.codigoPlaceholder' | translate"
                 maxlength="10" />
          <div class="invalid-feedback" *ngIf="itemForm.get('codigo')?.hasError('required') && itemForm.get('codigo')?.touched">
            {{ 'validation.required' | translate }}
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="almacen" formControlName="almacen" class="form-checkbox" />
            <span>{{ 'localidad.almacen' | translate }}</span>
          </label>
          <small class="form-text">No {{ 'common.ifNotChecked' | translate }}</small>
        </div>

        <div class="form-group">
          <label for="descripcion" class="form-label">{{ 'localidad.descripcion' | translate }} *</label>
          <input type="text"
                 id="descripcion"
                 formControlName="descripcion"
                 class="form-control"
                 [class.is-invalid]="itemForm.get('descripcion')?.invalid && itemForm.get('descripcion')?.touched"
                 [placeholder]="'localidad.descripcionPlaceholder' | translate"
                 maxlength="100" />
          <div class="invalid-feedback" *ngIf="itemForm.get('descripcion')?.hasError('required') && itemForm.get('descripcion')?.touched">
            {{ 'validation.required' | translate }}
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="saving">
          ❌ {{ 'common.cancel' | translate }}
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="saving || itemForm.invalid">
          <span *ngIf="!saving">💾 {{ 'common.save' | translate }}</span>
          <span *ngIf="saving">⏳ {{ 'common.saving' | translate }}</span>
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="loading" class="loading-container">
    <app-loader [translateKey]="'common.loading'" [center]="true" [size]="28" [inline]="false"></app-loader>
  </div>
</div>
