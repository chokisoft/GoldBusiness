<div class="container">
  <h2>{{ translations.title }}</h2>

  <!-- Sección de configuración -->
  <div class="config-section">
    <h3>{{ translations.configTitle }}</h3>
    <app-language-selector></app-language-selector>
  </div>

  <!-- Sección de prueba -->
  <div class="test-section">
    <h3>{{ translations.connectionTitle }}</h3>
    <button (click)="testConnection()"
            [disabled]="isLoading"
            class="btn-primary">
      {{ isLoading ? translations.testing : translations.testButton }}
    </button>
  </div>

  <!-- Resultados -->
  <div *ngIf="error" class="error">
    {{ translations.errorLabel }}: {{ error }}
  </div>

  <div *ngIf="apiResponse" class="success">
    <h3>{{ translations.successTitle }}</h3>
    <pre>{{ apiResponse | json }}</pre>
  </div>
</div>
