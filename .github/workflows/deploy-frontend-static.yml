name: Deploy Angular frontend to Azure Storage (static website)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_STORAGE_ACCOUNT: goldbusinessstorage

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./GoldBusiness.Client

      - name: Build (production)
        run: npm run build -- --configuration production
        working-directory: ./GoldBusiness.Client

      - name: Azure Login (service principal)
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload to Storage $web (static website)
        shell: bash
        run: |
          DIST_ROOT="./GoldBusiness.Client/dist/gold-business.client"
          if [ -d "${DIST_ROOT}/browser" ]; then
            DIST_PATH="${DIST_ROOT}/browser"
          else
            DIST_PATH="${DIST_ROOT}"
          fi

          if [ ! -d "$DIST_PATH" ]; then
            echo "ERROR: output folder not found: $DIST_PATH"
            ls -la ./GoldBusiness.Client/dist || true
            exit 1
          fi

          echo "Uploading from $DIST_PATH to \$web on account ${AZURE_STORAGE_ACCOUNT}"
          az storage blob upload-batch \
            --account-name "${AZURE_STORAGE_ACCOUNT}" \
            --source "$DIST_PATH" \
            --destination '$web' \
            --overwrite true \
            --auth-mode login \
            --no-progress

      - name: Verify public index
        run: |
          echo "HEAD https://${{ env.AZURE_STORAGE_ACCOUNT }}.z19.web.core.windows.net/index.html"
          curl -I "https://${{ env.AZURE_STORAGE_ACCOUNT }}.z19.web.core.windows.net/index.html" | sed -n '1,12p'