name: Deploy GoldBusiness API

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore GoldBusiness.sln

      - name: Build solution
        run: dotnet build GoldBusiness.sln -c Release --no-restore

      - name: Publish solution
        run: dotnet publish GoldBusiness.sln -c Release -o publish --no-build

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: goldbusinesswebapi-dev
          package: publish