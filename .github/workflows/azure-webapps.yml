name: Deploy GoldBusiness API

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Instalar manualmente .NET 10 preview
      - name: Install .NET 10 preview
        run: |
          wget https://dotnetcli.azureedge.net/dotnet/Sdk/10.0.100-preview.1/dotnet-sdk-10.0.100-preview.1-linux-x64.tar.gz -O dotnet10.tar.gz
          mkdir -p $HOME/dotnet10
          tar -zxf dotnet10.tar.gz -C $HOME/dotnet10
          echo "$HOME/dotnet10" >> $GITHUB_PATH

      - name: Restore solution
        run: dotnet restore GoldBusiness.sln

      - name: Build solution
        run: dotnet build GoldBusiness.sln -c Release --no-restore

      - name: Publish solution
        run: dotnet publish GoldBusiness.sln -c Release -o publish --no-build

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v2
        with:
          app-name: goldbusinesswebapi-dev
          package: publish